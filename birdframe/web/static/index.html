<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>birdframe</title>
<style>
  :root {
    --bg: #f7f5ef; --card: #fffef9; --ink: #23201a; --muted: #6b6455;
    --line: #e5e0d3; --accent: #4a6b4a;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1a1815; --card:#232019; --ink:#ece7db; --muted:#a49c88;
            --line:#33302a; --accent:#8fb98f; }
  }
  * { box-sizing: border-box; }
  body { margin:0; font:16px/1.5 Georgia, 'Times New Roman', serif;
         background:var(--bg); color:var(--ink); }
  header { padding:28px 24px 12px; }
  h1 { margin:0; font-size:28px; letter-spacing:.02em; }
  .sub { color:var(--muted); font-size:14px; margin-top:4px; }
  main { max-width:900px; margin:0 auto; padding:0 24px 48px; }
  nav { display:flex; gap:8px; margin:16px 0 24px; border-bottom:1px solid var(--line); }
  nav button { background:none; border:none; padding:10px 14px; font:inherit;
    color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; }
  nav button.active { color:var(--ink); border-bottom-color:var(--accent); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:16px 18px; margin-bottom:12px; }
  .row { display:flex; justify-content:space-between; align-items:baseline; gap:12px; }
  .name { font-size:18px; }
  .sci { color:var(--muted); font-style:italic; font-size:13px; }
  .count { font-variant-numeric:tabular-nums; color:var(--accent); font-size:20px; }
  .times { color:var(--muted); font-size:13px; }
  .btn { background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:10px 18px; font:inherit; cursor:pointer; }
  .btn:disabled { opacity:.5; cursor:default; }
  .btn.ghost { background:none; color:var(--accent); border:1px solid var(--accent);
    padding:6px 12px; font-size:14px; }
  .toolbar { display:flex; gap:12px; align-items:center; margin-bottom:20px; }
  .status { color:var(--muted); font-size:14px; }
  .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:12px; }
  .gallery figure { margin:0; }
  .gallery img { width:100%; border-radius:8px; border:1px solid var(--line);
    aspect-ratio:3/4; object-fit:cover; background:var(--line); }
  .gallery figcaption { font-size:12px; color:var(--muted); margin-top:4px; }
  .empty { color:var(--muted); padding:24px 0; }
  .setgroup { margin-bottom:20px; }
  .setgroup h3 { margin:0 0 8px; font-size:15px; color:var(--accent);
    text-transform:uppercase; letter-spacing:.06em; }
  .setfield { display:flex; justify-content:space-between; align-items:center;
    gap:12px; padding:8px 0; border-bottom:1px solid var(--line); }
  .setfield label { flex:1; }
  .setfield .hint { color:var(--muted); font-size:12px; }
  .setfield input, .setfield select { font:inherit; padding:6px 8px;
    border:1px solid var(--line); border-radius:6px; background:var(--card);
    color:var(--ink); min-width:180px; }
  .hero { background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:28px 24px; margin-bottom:16px; text-align:center; }
  .hero-label { color:var(--muted); font-size:13px; text-transform:uppercase;
    letter-spacing:.08em; }
  .hero-bird { font-size:34px; margin:6px 0 2px; }
  .hero-sci { font-style:italic; color:var(--muted); }
  .hero-meta { color:var(--muted); font-size:14px; margin-top:8px; }
  .pulse { display:inline-block; width:9px; height:9px; border-radius:50%;
    background:var(--accent); margin-right:7px; vertical-align:middle;
    animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.35;transform:scale(.8)} 50%{opacity:1;transform:scale(1.1)} }
  .mini { font-size:13px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--accent); margin:0 0 8px; }
  .nowgrid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media (max-width:640px){ .nowgrid{ grid-template-columns:1fr; } }
  .feedrow { display:flex; justify-content:space-between; align-items:center;
    gap:10px; padding:7px 0; border-bottom:1px solid var(--line); }
  .feedrow .t { color:var(--muted); font-variant-numeric:tabular-nums; font-size:13px; }
  .feedrow.fresh { animation:flash 1.2s ease-out; }
  @keyframes flash { from{ background:color-mix(in srgb, var(--accent) 22%, transparent); } to{ background:transparent; } }
  .conf { height:6px; border-radius:3px; background:var(--accent); display:inline-block;
    vertical-align:middle; margin-left:8px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { background:color-mix(in srgb, var(--accent) 15%, transparent);
    color:var(--accent); border-radius:999px; padding:3px 10px; font-size:13px; }
  .stylecard { display:flex; gap:14px; align-items:flex-start; }
  .stylecard .thumb { width:96px; height:128px; border-radius:8px; object-fit:cover;
    border:1px solid var(--line); background:var(--line); flex:none; }
  .stylecard .thumb.none { display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:11px; text-align:center; padding:6px; }
  .stylecard .body { flex:1; min-width:0; }
  .stylecard .prompt { color:var(--muted); font-size:14px; margin:4px 0 10px; }
  .badge { background:var(--accent); color:#fff; border-radius:999px; padding:2px 9px;
    font-size:12px; margin-left:8px; }
  .style-actions { display:flex; flex-wrap:wrap; gap:8px; }
  textarea { width:100%; font:inherit; padding:8px 10px; border:1px solid var(--line);
    border-radius:8px; background:var(--card); color:var(--ink); resize:vertical; box-sizing:border-box; }
  .promptpreview { background:color-mix(in srgb, var(--accent) 8%, transparent);
    border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:13px;
    color:var(--ink); white-space:pre-wrap; }
  .editor-actions { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:14px; }
  #editorPreview img { max-width:320px; border-radius:10px; border:1px solid var(--line);
    margin-top:14px; }
  code { background:color-mix(in srgb, var(--accent) 12%, transparent); padding:1px 5px;
    border-radius:4px; font-size:.9em; }
</style>
</head>
<body>
<header>
  <h1>🐦 birdframe</h1>
  <div class="sub">The birds heard outside the window in Edinburgh</div>
</header>
<main>
  <nav>
    <button data-tab="now" class="active">Now</button>
    <button data-tab="today">Today</button>
    <button data-tab="gallery">Gallery</button>
    <button data-tab="styles">Styles</button>
    <button data-tab="settings">Settings</button>
  </nav>

  <section id="now">
    <div class="hero" id="hero">
      <div class="hero-label">Listening…</div>
    </div>
    <div class="toolbar">
      <button class="btn" id="captureBtn">Capture current birds</button>
      <span class="status" id="captureStatus"></span>
    </div>
    <div class="nowgrid">
      <div>
        <h3 class="mini">Heard just now</h3>
        <div id="feed"></div>
      </div>
      <div>
        <h3 class="mini">In the last <span id="winMin">60</span> min</h3>
        <div id="windowSpecies"></div>
        <h3 class="mini" style="margin-top:18px">New for today</h3>
        <div id="newToday" class="chips"></div>
      </div>
    </div>
  </section>

  <section id="today" hidden>
    <div class="toolbar">
      <button class="btn" id="postNow">Post now</button>
      <span class="status" id="status"></span>
    </div>
    <div id="speciesList"></div>
  </section>

  <section id="gallery" hidden>
    <div class="gallery" id="galleryGrid"></div>
  </section>

  <section id="styles" hidden>
    <div class="toolbar">
      <button class="btn" id="newStyle" type="button">New style</button>
      <span class="status" id="stylesKeyNote"></span>
    </div>
    <div id="stylesList"></div>

    <div id="styleEditor" hidden>
      <h3 class="mini" id="editorTitle">Edit style</h3>
      <div class="card">
        <div class="setfield"><label>Name</label>
          <input id="styleName" placeholder="e.g. Bauhaus Poster"></div>
        <label class="mini" style="display:block;margin-top:12px">Prompt
          <span class="hint">— must contain <code>{scene}</code>, which birdframe fills with the day's birds</span></label>
        <textarea id="stylePrompt" rows="5"></textarea>
        <label class="mini" style="display:block;margin-top:12px">Avoid <span class="hint">(optional)</span></label>
        <textarea id="styleAvoid" rows="2"></textarea>
        <div style="margin-top:12px">
          <div class="mini">Assembled prompt (with today's sample birds)</div>
          <div class="promptpreview" id="assembledPrompt"></div>
        </div>
        <div class="editor-actions">
          <button class="btn" id="saveStyle" type="button">Save style</button>
          <button class="btn ghost" id="previewStyle" type="button">Generate example image</button>
          <button class="btn ghost" id="cancelStyle" type="button">Cancel</button>
          <span class="status" id="styleStatus"></span>
        </div>
        <div id="editorPreview"></div>
      </div>
    </div>
  </section>

  <section id="settings" hidden>
    <form id="settingsForm"></form>
    <div class="toolbar" style="margin-top:16px">
      <button class="btn" id="saveSettings" type="button">Save settings</button>
      <span class="status" id="settingsStatus"></span>
    </div>
  </section>
</main>

<script>
const $ = s => document.querySelector(s);
const tabs = document.querySelectorAll('nav button');
let activeTab = 'now';
tabs.forEach(b => b.onclick = () => {
  activeTab = b.dataset.tab;
  tabs.forEach(x => x.classList.toggle('active', x === b));
  ['now','today','gallery','styles','settings'].forEach(t => $('#'+t).hidden = activeTab !== t);
  if (activeTab === 'gallery') loadGallery();
  if (activeTab === 'settings') loadSettings();
  if (activeTab === 'now') loadNow();
  if (activeTab === 'today') loadToday();
  if (activeTab === 'styles') loadStyles();
});

// ---- Now Listening (live) ----
let lastTopAt = null;
async function loadNow() {
  let d;
  try { d = await (await fetch('/api/now')).json(); }
  catch { return; }
  $('#winMin').textContent = d.window_minutes;
  const hero = $('#hero');
  if (d.latest) {
    const ago = d.latest.seconds_ago;
    const when = ago < 90 ? `${ago}s ago` : `at ${d.latest.at}`;
    hero.innerHTML = `
      <div class="hero-label"><span class="pulse"></span>Most recent bird</div>
      <div class="hero-bird">${d.latest.common_name}</div>
      <div class="hero-sci">${d.latest.scientific_name}</div>
      <div class="hero-meta">heard ${when} · confidence ${d.latest.confidence} ·
        ${d.today_species_count} species today</div>`;
  } else {
    hero.innerHTML = `<div class="hero-label"><span class="pulse"></span>Listening…</div>
      <div class="hero-meta" style="margin-top:10px">No birds heard yet — the mic is open and waiting.</div>`;
  }
  const topAt = d.feed[0] ? d.feed[0].at + d.feed[0].common_name : null;
  $('#feed').innerHTML = d.feed.length ? d.feed.map((f,i) => `
    <div class="feedrow ${i===0 && topAt!==lastTopAt ? 'fresh':''}">
      <span>${f.common_name} <span class="conf" style="width:${Math.round(f.confidence*46)}px"></span></span>
      <span class="t">${f.at}</span>
    </div>`).join('') : '<div class="empty">Nothing in the feed yet.</div>';
  lastTopAt = topAt;
  $('#windowSpecies').innerHTML = d.window_species.length ? d.window_species.map(s => `
    <div class="feedrow"><span>${s.common_name}</span>
      <span class="t">×${s.count} · ${s.best_confidence}</span></div>`).join('')
    : '<div class="empty">Quiet in this window.</div>';
  $('#newToday').innerHTML = d.new_today.length
    ? d.new_today.map(n => `<span class="chip">${n}</span>`).join('')
    : '<span class="empty">None yet today.</span>';
}

async function capture() {
  const btn = $('#captureBtn');
  btn.disabled = true; $('#captureStatus').textContent = 'Capturing the current soundscape…';
  try {
    const r = await (await fetch('/api/capture', {method:'POST'})).json();
    const birds = r.species.length ? r.species.join(', ') : 'a quiet moment';
    $('#captureStatus').textContent = `Captured ${birds} — frame: ${r.publish}.`;
  } catch (e) { $('#captureStatus').textContent = 'Error: ' + e; }
  btn.disabled = false;
}

// Fields that are best edited as a dropdown rather than free text.
const ENUMS = {
  post_mode: ['daily', 'live', 'manual'],
  style_mode: ['rotate', 'pinned'],
  image_quality: ['low', 'medium', 'high'],
  openai_model: ['gpt-image-1-mini', 'gpt-image-1', 'gpt-image-1.5', 'gpt-image-2', 'chatgpt-image-latest'],
};

async function loadSettings() {
  const data = await (await fetch('/api/settings')).json();
  $('#settingsForm').innerHTML = data.groups.map(g => `
    <div class="setgroup"><h3>${g.group}</h3>
    ${g.fields.map(f => `
      <div class="setfield">
        <label>${f.key.replace(/_/g,' ')}
          ${f.restart ? '<span class="hint">(restart to apply)</span>' : ''}</label>
        ${ENUMS[f.key]
          ? `<select data-key="${f.key}">${ENUMS[f.key].map(o =>
              `<option ${o==f.value?'selected':''}>${o}</option>`).join('')}</select>`
          : `<input data-key="${f.key}" value="${f.value ?? ''}">`}
      </div>`).join('')}
    </div>`).join('');
  $('#settingsStatus').textContent = '';
}

async function saveSettings() {
  const body = {};
  document.querySelectorAll('[data-key]').forEach(el => body[el.dataset.key] = el.value);
  const r = await fetch('/api/settings', {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  const res = await r.json();
  if (!r.ok) { $('#settingsStatus').textContent = 'Error: ' + JSON.stringify(res.fields); return; }
  let msg = `Saved ${res.saved.length} settings.`;
  if (res.restart_required.length) msg += ' Restart needed for: ' + res.restart_required.join(', ') + '.';
  $('#settingsStatus').textContent = msg;
}

async function loadToday() {
  const data = await (await fetch('/api/today')).json();
  const list = $('#speciesList');
  if (!data.species.length) {
    list.innerHTML = '<div class="empty">No birds heard yet today. Listening…</div>';
    return;
  }
  list.innerHTML = data.species.map(s => `
    <div class="card"><div class="row">
      <div><div class="name">${s.common_name}</div>
        <div class="sci">${s.scientific_name}</div></div>
      <div style="text-align:right">
        <div class="count">${s.count}</div>
        <div class="times">${s.first_heard}–${s.last_heard}</div>
      </div>
    </div></div>`).join('');
}

async function loadGallery() {
  const data = await (await fetch('/api/history')).json();
  const grid = $('#galleryGrid');
  if (!data.images.length) {
    grid.innerHTML = '<div class="empty">No pictures yet. Hit “Post now”.</div>';
    return;
  }
  grid.innerHTML = data.images.map(i => `
    <figure>
      <img src="/api/image/${i.id}" alt="${i.style}" loading="lazy">
      <figcaption>${i.generated_at.slice(0,10)} · ${i.style}<br>
        <button class="btn ghost" onclick="repost(${i.id})">Re-post</button>
      </figcaption>
    </figure>`).join('');
}

async function postNow() {
  const btn = $('#postNow');
  btn.disabled = true; $('#status').textContent = 'Painting the day’s birds…';
  try {
    const r = await (await fetch('/api/post-now', {method:'POST'})).json();
    $('#status').textContent = 'Frame: ' + r.publish + (r.detail ? ' — ' + r.detail : '');
  } catch (e) { $('#status').textContent = 'Error: ' + e; }
  btn.disabled = false;
}

async function repost(id) {
  $('#status') && ($('#status').textContent = '');
  const r = await (await fetch('/api/repost/' + id, {method:'POST'})).json();
  alert('Re-post: ' + r.publish + (r.detail ? ' — ' + r.detail : ''));
}

// ---- Styles editor ----
let stylesData = {styles:[], sample_scene:'', key_set:false};
let editingOriginal = null;   // slug being edited, or null when creating new

function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function loadStyles() {
  stylesData = await (await fetch('/api/styles')).json();
  $('#stylesKeyNote').textContent = stylesData.key_set
    ? '' : 'Set an OpenAI key to generate example images.';
  $('#styleEditor').hidden = true;
  $('#stylesList').hidden = false;
  $('#stylesList').innerHTML = stylesData.styles.map(s => `
    <div class="card stylecard">
      ${s.has_preview
        ? `<img class="thumb" src="/api/styles/${s.name}/preview.png?t=${Date.now()}" alt="">`
        : `<div class="thumb none">no example yet</div>`}
      <div class="body">
        <div class="name">${esc(s.name)}${s.pinned?'<span class="badge">pinned</span>':''}</div>
        <div class="prompt">${esc(s.prompt)}</div>
        <div class="style-actions">
          <button class="btn ghost" onclick="editStyle('${s.name}')">Edit</button>
          ${s.pinned
            ? `<button class="btn ghost" onclick="unpinStyle()">Unpin</button>`
            : `<button class="btn ghost" onclick="pinStyle('${s.name}')">Pin</button>`}
          <button class="btn ghost" onclick="deleteStyle('${s.name}')">Delete</button>
        </div>
      </div>
    </div>`).join('');
}

function openEditor(style) {
  editingOriginal = style ? style.name : null;
  $('#editorTitle').textContent = style ? `Edit “${style.name}”` : 'New style';
  $('#styleName').value = style ? style.name : '';
  $('#stylePrompt').value = style ? style.prompt : 'A ??? of {scene}.';
  $('#styleAvoid').value = style ? style.avoid : 'photorealism, gradients, text, watermarks';
  $('#styleStatus').textContent = '';
  $('#editorPreview').innerHTML = style && style.has_preview
    ? `<img src="/api/styles/${style.name}/preview.png?t=${Date.now()}" alt="example">` : '';
  $('#stylesList').hidden = true;
  $('#styleEditor').hidden = false;
  updateAssembled();
}
function editStyle(name){ openEditor(stylesData.styles.find(s => s.name === name)); }

function updateAssembled() {
  const p = $('#stylePrompt').value, a = $('#styleAvoid').value.trim();
  let out = p.replace('{scene}', stylesData.sample_scene);
  if (a) out += '\n\nAvoid: ' + a;
  $('#assembledPrompt').textContent = out;
}

async function saveStyle() {
  const name = $('#styleName').value.trim();
  const prompt = $('#stylePrompt').value;
  if (!prompt.includes('{scene}')) { $('#styleStatus').textContent = 'Prompt must contain {scene}.'; return; }
  const r = await fetch('/api/styles/' + encodeURIComponent(name || 'style'), {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, prompt, avoid: $('#styleAvoid').value})});
  const res = await r.json();
  if (!r.ok) { $('#styleStatus').textContent = 'Error: ' + res.error; return; }
  await loadStyles();
}

async function previewStyle() {
  if (!stylesData.key_set) { $('#styleStatus').textContent = 'Set an OpenAI key first (birdframe set-key).'; return; }
  // Save first so the preview reflects the current prompt.
  const name = $('#styleName').value.trim();
  const prompt = $('#stylePrompt').value;
  if (!prompt.includes('{scene}')) { $('#styleStatus').textContent = 'Prompt must contain {scene}.'; return; }
  $('#previewStyle').disabled = true;
  $('#styleStatus').textContent = 'Painting an example (gpt-image takes ~2 min, this costs one image)…';
  await fetch('/api/styles/' + encodeURIComponent(name), {method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, prompt, avoid: $('#styleAvoid').value})});
  const slug = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const r = await fetch('/api/styles/' + slug + '/preview', {method:'POST'});
  const res = await r.json();
  if (!r.ok) { $('#previewStyle').disabled = false; $('#styleStatus').textContent = 'Error: ' + res.error; return; }
  // Poll until the background generation writes the image.
  const started = Date.now();
  const poll = setInterval(async () => {
    const st = await (await fetch('/api/styles/' + slug + '/preview-status')).json();
    const secs = Math.round((Date.now()-started)/1000);
    if (st.status === 'ready') {
      clearInterval(poll); $('#previewStyle').disabled = false;
      $('#styleStatus').textContent = 'Example ready.';
      $('#editorPreview').innerHTML = `<img src="/api/styles/${slug}/preview.png?t=${Date.now()}" alt="example">`;
    } else if (st.status === 'error') {
      clearInterval(poll); $('#previewStyle').disabled = false;
      $('#styleStatus').textContent = 'Error: ' + (st.detail || 'generation failed');
    } else {
      $('#styleStatus').textContent = `Painting an example… ${secs}s`;
    }
  }, 3000);
}

async function pinStyle(name){ await fetch('/api/styles/'+name+'/pin', {method:'POST'}); loadStyles(); }
async function unpinStyle(){ await fetch('/api/styles/unpin', {method:'POST'}); loadStyles(); }
async function deleteStyle(name){
  const r = await fetch('/api/styles/'+name, {method:'DELETE'});
  if (!r.ok) { alert((await r.json()).error); return; }
  loadStyles();
}

$('#postNow').onclick = postNow;
$('#saveSettings').onclick = saveSettings;
$('#captureBtn').onclick = capture;
$('#newStyle').onclick = () => openEditor(null);
$('#saveStyle').onclick = saveStyle;
$('#previewStyle').onclick = previewStyle;
$('#cancelStyle').onclick = loadStyles;
document.addEventListener('input', e => {
  if (e.target.id === 'stylePrompt' || e.target.id === 'styleAvoid') updateAssembled();
});
loadNow();
setInterval(() => { if (activeTab === 'now') loadNow(); }, 4000);
setInterval(() => { if (activeTab === 'today') loadToday(); }, 30000);
</script>
</body>
</html>
