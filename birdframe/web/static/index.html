<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#173c31">
  <meta name="description" content="A living field journal of the birds heard at the window in Edinburgh.">
  <title>birdframe · field journal</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="/static/app.css?v=4">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="birdframe">
</head>
<body>
  <a class="skip-link" href="#app">Skip to the journal</a>

  <header class="app-header">
    <div class="header-inner">
      <a class="brand" href="#today" aria-label="birdframe today">
        <img src="/icon-192.png" alt="" width="38" height="38">
        <span>
          <strong>birdframe</strong>
          <small>the window field journal</small>
        </span>
      </a>

      <nav class="primary-nav" aria-label="Primary navigation">
        <a href="#today" data-nav="today">Today</a>
        <a href="#journal" data-nav="journal">Journal</a>
        <a href="#species" data-nav="species">Species</a>
        <a href="#patterns" data-nav="patterns">Patterns</a>
        <a href="#pictures" data-nav="pictures">Pictures</a>
      </nav>

      <div class="header-tools">
        <span class="listen-status" id="listenStatus" aria-live="polite">
          <i></i><span>Listening</span>
        </span>
        <a class="icon-link" href="#settings" data-nav="settings" aria-label="Settings" title="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.25A3.25 3.25 0 1 0 12 8.75a3.25 3.25 0 0 0 0 6.5Zm7.4-2.2c.04-.35.06-.7.06-1.05s-.02-.7-.07-1.05l2.05-1.6-2-3.46-2.54 1.02a8.3 8.3 0 0 0-1.82-1.05L14.7 3.15h-4l-.4 2.71a8.4 8.4 0 0 0-1.82 1.05L5.95 5.89l-2 3.46L6 10.95c-.05.35-.07.7-.07 1.05s.02.7.07 1.05l-2.05 1.6 2 3.46 2.53-1.02c.56.43 1.17.78 1.82 1.05l.4 2.71h4l.39-2.71a8.3 8.3 0 0 0 1.82-1.05l2.54 1.02 2-3.46-2.05-1.6Z"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main id="app" tabindex="-1">
    <div class="loading-page" role="status">
      <span class="wingbeat"></span>
      <p>Opening the field journal…</p>
    </div>
  </main>

  <nav class="mobile-nav" aria-label="Mobile navigation">
    <a href="#today" data-nav="today"><span>◉</span>Today</a>
    <a href="#journal" data-nav="journal"><span>▤</span>Journal</a>
    <a href="#species" data-nav="species"><span>♧</span>Species</a>
    <a href="#patterns" data-nav="patterns"><span>⌁</span>Patterns</a>
    <a href="#pictures" data-nav="pictures"><span>▧</span>Pictures</a>
  </nav>

  <div class="audio-dock" id="audioDock" hidden>
    <button type="button" class="audio-toggle" id="audioToggle" aria-label="Pause recording">Ⅱ</button>
    <div class="audio-copy"><strong id="audioTitle">Recording</strong><small id="audioMeta">Your window</small></div>
    <div class="audio-progress"><i id="audioProgress"></i></div>
    <button type="button" class="audio-close" id="audioClose" aria-label="Close player">×</button>
  </div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Picture viewer" hidden>
    <button type="button" class="lightbox-close" data-action="close-lightbox" aria-label="Close picture">×</button>
    <img id="lightboxImage" alt="">
    <div id="lightboxCaption"></div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script type="module" src="/static/js/app.js?v=4"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});</script>
</body>
</html>
